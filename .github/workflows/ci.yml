name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Git hygiene + secret scanning + Dockerfile lint ---
  pre-commit:
    name: Pre-commit (hygiene + gitleaks + hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  # --- apps/sync: pytest (no DB needed; sources mocked via respx) ---
  sync-tests:
    name: apps/sync tests (uv + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sync
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --extra dev --frozen
      - run: uv run pytest -v

  # --- apps/api: Maven build + run tests (when present) on JDK 21 ---
  api-tests:
    name: apps/api build + tests (Maven / JDK 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # package runs the test phase (surefire); tests run once added.
      - run: ./mvnw -B -ntp clean package

  # --- apps/web: Vite production build ---
  web-build:
    name: apps/web build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  # --- Docker: build all three service images as docker compose would ---
  docker-build:
    name: Docker images (compose build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # docker-compose.yml uses ${VAR:-default} defaults, so no .env needed.
      - run: docker compose build
