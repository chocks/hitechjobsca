# Spring DATASOURCE
# Credentials come from the environment (Spring Boot relaxed binding maps
# SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD). The defaults below are for
# local dev only -- never commit real credentials here.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:developer}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:developer}

# The SQL dialect makes Hibernate generate better SQL for the chosen database.
# Hibernate 6 dropped the version-specific PostgreSQL dialects in favor of a
# single org.hibernate.dialect.PostgreSQLDialect.
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = update
