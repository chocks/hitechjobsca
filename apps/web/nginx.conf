server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API endpoints to the Spring Boot service. The frontend
    # calls these same-origin (see apps/web/src/actions/index.js -> API = '').
    location /ca_jobs {
        proxy_pass http://api:8080/ca_jobs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /new {
        proxy_pass http://api:8080/new;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /search {
        proxy_pass http://api:8080/search;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
