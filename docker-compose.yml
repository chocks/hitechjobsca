# Full local stack: Postgres + Spring Boot API + nginx-served frontend.
#   docker compose up --build
# Then open http://localhost:3000
#
# Credentials come from .env (copy .env.example -> .env). The defaults below
# are dev-only.

services:
  db:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jodb}
      POSTGRES_USER: ${POSTGRES_USER:-developer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-developer}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-developer} -d ${POSTGRES_DB:-jodb}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build: ./apps/api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-jodb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-developer}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-developer}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build: ./apps/web
    depends_on:
      - api
    ports:
      - "3000:80"

  # Jobs ingest. Upserts into jobs.all_jobs (idempotent on ext_id). Runs once
  # and exits by default; set SYNC_INTERVAL_SECONDS to run it as a loop/sidecar.
  #   docker compose --profile sync run --rm sync
  #   # dry-run (fetch + parse, no DB write):
  #   docker compose --profile sync run --rm -e SYNC_DRY_RUN=1 sync
  sync:
    profiles: ["sync"]
    build: ./apps/sync
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-jodb}
      DB_USER: ${POSTGRES_USER:-developer}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-developer}
      DATA_FOLDER: /data
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-}
      SYNC_DRY_RUN: ${SYNC_DRY_RUN:-}
      SYNC_GITHUB_TOKEN: ${SYNC_GITHUB_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - syncdata:/data

volumes:
  pgdata:
  syncdata:
